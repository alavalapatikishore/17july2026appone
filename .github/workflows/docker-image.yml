name: Build, Push and Deploy to Kubernetes

on:
  push:
    branches:
      - master

env:
  IMAGE_NAME: saikishorea/18july2026one

jobs:
  deploy:
    runs-on: self-hosted

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build Docker Image
        run: |
          docker build \
            -t $IMAGE_NAME:latest \
            -t $IMAGE_NAME:${{ github.sha }} \
            .

      - name: Push Docker Images
        run: |
          docker push $IMAGE_NAME:latest
          docker push $IMAGE_NAME:${{ github.sha }}

      - name: Create Namespace
        run: |
          kubectl apply -f k8s/namespace.yaml

      - name: Deploy Application
        run: |
          kubectl apply -f k8s/deployment.yaml

      - name: Create Service
        run: |
          kubectl apply -f k8s/service.yaml

      - name: Wait for Rollout
        run: |
          kubectl rollout status deployment/dental-app -n dental --timeout=180s

      - name: Verify Deployment
        run: |
          echo "========== Nodes =========="
          kubectl get nodes

          echo "========== Namespace =========="
          kubectl get ns

          echo "========== Pods =========="
          kubectl get pods -n dental -o wide

          echo "========== Services =========="
          kubectl get svc -n dental

          echo "========== Deployment =========="
          kubectl get deployment -n dental

          echo "========== ReplicaSets =========="
          kubectl get rs -n dental
