name: Build, Push and Deploy to Kubernetes

on:
  push:
    branches:
      - master

env:
  IMAGE_NAME: saikishorea/18july2026one

jobs:
  deploy:

    runs-on: self-hosted

    steps:

      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build Docker Image
        run: |
          docker build \
          -t $IMAGE_NAME:latest \
          -t $IMAGE_NAME:${{ github.sha }} .

      - name: Push Docker Images
        run: |
          docker push $IMAGE_NAME:latest
          docker push $IMAGE_NAME:${{ github.sha }}

      - name: Deploy to Kubernetes
        run: |
          kubectl apply -f k8s/

      - name: Wait for Rollout
        run: |
          kubectl rollout status deployment/dental-app -n dental

      - name: Verify Deployment
        run: |
          kubectl get nodes
          kubectl get pods -n dental
          kubectl get svc -n dental
          kubectl get deployment -n dental
