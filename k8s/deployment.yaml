apiVersion: apps/v1
kind: Deployment

metadata:
  name: dental-app
  namespace: dental

spec:
  replicas: 2

  selector:
    matchLabels:
      app: dental-app

  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0

  template:
    metadata:
      labels:
        app: dental-app

    spec:
      containers:
      - name: dental-container
        image: saikishorea/18july2026one:latest
        imagePullPolicy: Always

        ports:
        - containerPort: 80
