name: Build, Push and Deploy to Kubernetes

on:
  push:
    branches:
      - master

env:
  IMAGE_NAME: saikishorea/18july2026one
  NAMESPACE: dental
  DEPLOYMENT: dental-app
  CONTAINER: dental-container

jobs:
  deploy:
    runs-on: self-hosted

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build Docker Image
        run: |
          docker build \
            -t $IMAGE_NAME:${{ github.sha }} \
            -t $IMAGE_NAME:latest \
            .

      - name: Push Docker Images
        run: |
          docker push $IMAGE_NAME:${{ github.sha }}
          docker push $IMAGE_NAME:latest

      - name: Create Namespace
        run: |
          kubectl apply -f k8s/namespace.yaml

      - name: Create Deployment (First Time)
        run: |
          kubectl apply -f k8s/deployment.yaml

      - name: Create Service
        run: |
          kubectl apply -f k8s/service.yaml

      - name: Update Deployment Image
        run: |
          kubectl set image deployment/$DEPLOYMENT \
          $CONTAINER=$IMAGE_NAME:${{ github.sha }} \
          -n $NAMESPACE

      - name: Wait for Rolling Update
        run: |
          kubectl rollout status deployment/$DEPLOYMENT \
          -n $NAMESPACE \
          --timeout=300s

      - name: Verify Deployment
        run: |
          echo "========== Nodes =========="
          kubectl get nodes

          echo "========== Pods =========="
          kubectl get pods -n $NAMESPACE -o wide

          echo "========== Services =========="
          kubectl get svc -n $NAMESPACE

          echo "========== Deployment =========="
          kubectl get deployment -n $NAMESPACE

          echo "========== ReplicaSets =========="
          kubectl get rs -n $NAMESPACE

          echo "========== Rollout History =========="
          kubectl rollout history deployment/$DEPLOYMENT -n $NAMESPACE
